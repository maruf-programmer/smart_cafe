{% extends 'core/base.html' %}

{% block title %}Savat{% endblock %}
{% block header_title %}Savat{% endblock %}

{% block extra_css %}
<style>
    .cart-empty {
        text-align: center;
        padding: 60px 20px;
    }

    .cart-empty i {
        font-size: 4rem;
        color: rgba(255, 255, 255, 0.2);
        margin-bottom: 20px;
    }

    .cart-empty h3 {
        font-size: 1.2rem;
        margin-bottom: 10px;
        color: rgba(255, 255, 255, 0.7);
    }

    .cart-item {
        display: flex;
        gap: 15px;
        padding: 15px;
        margin-bottom: 15px;
        align-items: center;
    }

    .cart-item-img {
        width: 80px;
        height: 80px;
        border-radius: 12px;
        overflow: hidden;
        flex-shrink: 0;
    }

    .cart-item-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .cart-item-img .placeholder {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #2c3e50, #34495e);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.2);
    }

    .cart-item-info { flex: 1; }

    .cart-item-info h4 {
        font-size: 0.95rem;
        margin-bottom: 5px;
    }

    .cart-item-info .details {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 8px;
    }

    .cart-item-info .item-price {
        font-size: 1rem;
        font-weight: 600;
        color: #f39c12;
    }

    .cart-item-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .remove-btn {
        background: rgba(231, 76, 60, 0.2);
        border: none;
        color: #e74c3c;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
    }

    .cart-summary {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px;
        margin-top: 20px;
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.7);
    }

    .summary-row.total {
        font-size: 1.2rem;
        font-weight: 700;
        color: #f39c12;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .checkout-btn {
        width: 100%;
        padding: 16px;
        font-size: 1.1rem;
        margin-top: 20px;
    }

    .nav-links {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .nav-links a {
        flex: 1;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="nav-links">
        <a href="{% url 'core:menu' table_id %}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Menyuga qaytish</a>
        <a href="{% url 'core:my_orders' table_id %}" class="btn btn-secondary"><i class="fas fa-list"></i> Buyurtmalarim</a>
    </div>

    <div id="cart-container">
        <!-- Loaded dynamically -->
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const tableId = "{{ table_id }}";

    async function loadCart() {
        try {
            const res = await fetch(`/api/cart/${tableId}/`);
            const data = await res.json();
            const container = document.getElementById('cart-container');
            
            if (!data.cart_items || data.cart_items.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>Savat bo'sh</h3>
                        <p style="color: rgba(255,255,255,0.5); margin-bottom: 20px;">Taomlarni tanlab, savatga qo'shing</p>
                        <a href="/menu/${tableId}/" class="btn btn-primary"><i class="fas fa-utensils"></i> Menyuni ko'rish</a>
                    </div>
                `;
                return;
            }
            
            let itemsHTML = '';
            data.cart_items.forEach(item => {
                itemsHTML += `
                    <div class="cart-item card">
                        <div class="cart-item-img">
                            <div class="placeholder"><i class="fas fa-utensils"></i></div>
                        </div>
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <div class="details">${item.servings} kishilik · ${item.quantity} dona</div>
                            <div class="item-price">${Number(item.subtotal).toLocaleString()} so'm</div>
                        </div>
                        <div class="cart-item-actions">
                            <button onclick="removeItem(${item.index})" class="remove-btn"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = `
                ${itemsHTML}
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Taomlar soni:</span>
                        <span>${data.cart_items.length} ta</span>
                    </div>
                    <div class="summary-row total">
                        <span>Jami:</span>
                        <span>${Number(data.total_price).toLocaleString()} so'm</span>
                    </div>
                    <form id="checkoutForm">
                        <div class="form-group" style="margin-top: 15px;">
                            <textarea id="checkoutNotes" rows="2" placeholder="Qo'shimcha eslatma (ixtiyoriy)" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-family: inherit; outline: none;"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success checkout-btn">
                            <i class="fas fa-paper-plane"></i> Buyurtma berish
                        </button>
                    </form>
                </div>
            `;
            
            document.getElementById('checkoutForm').addEventListener('submit', handleCheckout);
        } catch (err) {
            console.error('Cart load error:', err);
        }
    }

    async function removeItem(index) {
        try {
            const res = await fetch(`/api/cart/${tableId}/remove/${index}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                loadCart();
            } else {
                showMessage(data.error || 'Olib tashlashda xatolik', 'error');
            }
        } catch (err) {
            console.error('Remove item error:', err);
            showMessage('Tizim bilan bog\'lanishda xatolik', 'error');
        }
    }

    async function handleCheckout(e) {
        e.preventDefault();
        try {
            const notes = document.getElementById('checkoutNotes').value;
            const res = await fetch(`/api/cart/${tableId}/checkout/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ notes })
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                setTimeout(() => window.location.href = `/orders/${tableId}/`, 1500);
            } else {
                showMessage(data.error || 'Buyurtma yuborishda xatolik', 'error');
            }
        } catch (err) {
            console.error('Checkout error:', err);
            showMessage('Tizim bilan bog\'lanishda xatolik', 'error');
        }
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadCart();
    });
</script>
{% endblock %}
