<!DOCTYPE html>
<html lang="uz">
<head>
    <script src="../js/config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyurtmalar - Cafe Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #090d16;
            --bg-sidebar: rgba(17, 24, 39, 0.6);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header i {
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-nav {
            padding: 20px 12px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(99, 102, 241, 0.05));
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-left: 260px;
            padding: 30px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .page-title h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
        }

        /* Tables & Lists (Glass cards) */
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 24px;
            background-color: rgba(255, 255, 255, 0.02);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Badges */
        .badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-info { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.2); }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #4f46e5); 
            color: white; 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }
        .btn-outline { 
            border-color: var(--border); 
            color: var(--text-main); 
            background: rgba(255, 255, 255, 0.05); 
        }
        .btn-outline:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.2);
        }

        .messages {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .message {
            padding: 14px 24px;
            border-radius: 12px;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            font-size: 0.875rem;
            color: #fff;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
    <style>
    .orders-page-bg {
        position: absolute;
        inset: 0;
        background: linear-gradient(rgba(11, 15, 25, 0.85), rgba(17, 24, 39, 0.95)), 
                    url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
        z-index: -1;
    }

    .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
        margin-top: 20px;
    }

    .order-slip {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 24px;
        transition: all 0.3s;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
    }

    .order-slip:hover {
        transform: translateY(-5px);
        border-color: rgba(99, 102, 241, 0.4);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    }

    .order-slip.pending { border-top: 6px solid var(--warning); }
    .order-slip.preparing { border-top: 6px solid var(--primary); }
    .order-slip.ready { border-top: 6px solid var(--success); }

    .slip-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px dashed rgba(255,255,255,0.1);
        padding-bottom: 12px;
        margin-bottom: 16px;
    }

    .slip-header h3 {
        font-size: 1.15rem;
        font-weight: 800;
        color: #fff;
    }

    .slip-items {
        list-style: none;
        padding: 0;
        margin: 0 0 20px 0;
    }

    .slip-item {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .slip-item:last-child { border: none; }
    .slip-item .qty { color: #f39c12; font-weight: 700; }

    .slip-notes {
        background: rgba(245, 158, 11, 0.05);
        border: 1px solid rgba(245, 158, 11, 0.1);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.8rem;
        color: #fbbf24;
        margin-bottom: 20px;
    }

    .slip-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8rem;
        color: var(--text-muted);
        border-top: 1px solid rgba(255,255,255,0.05);
        padding-top: 12px;
        margin-bottom: 16px;
    }

    .slip-footer .total {
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
    }

    .slip-actions {
        display: flex;
        gap: 8px;
    }

    .slip-actions select {
        flex: 1;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--border);
        color: #fff;
        border-radius: 10px;
        padding: 8px;
        outline: none;
    }
</style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-mug-hot"></i>
            <h2>Cafe Admin</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="staff/dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Buyurtmalar</span>
            </a>
            <a href="calls.html" class="nav-item">
                <i class="fas fa-bell"></i>
                <span>Chaqiruvlar</span>
            </a>
            <a href="../menu.html" class="nav-item">
                <i class="fas fa-utensils"></i>
                <span>Menyu</span>
            </a>
            <a href="tables.html" class="nav-item">
                <i class="fas fa-chair"></i>
                <span>Stollar</span>
            </a>
            <a href="{% url 'core:staff_settings' %}" class="nav-item">
                <i class="fas fa-user-cog"></i>
                <span>Sozlamalar</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="{% url 'core:staff_logout' %}" class="nav-item">
                <i class="fas fa-sign-out-alt"></i>
                <span>Chiqish</span>
            </a>
        </div>
    </div>

    <main class="main-content">
        <div class="messages" id="js-messages"></div>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="top-bar">
            <div class="page-title">
                <h1>Buyurtmalar boshqaruvi</h1>
                <p>Boshqaruv Panel</p>
            </div>
            <div class="top-bar-actions">
                <div style="display: flex; gap: 10px;">
    <button onclick="filterStatus('pending')" class="btn btn-outline" id="btn-pending">Kutilmoqda</button>
    <button onclick="filterStatus('preparing')" class="btn btn-outline" id="btn-preparing">Tayyorlanmoqda</button>
    <button onclick="filterStatus('ready')" class="btn btn-outline" id="btn-ready">Tayyor</button>
    <button onclick="filterStatus('')" class="btn btn-outline" id="btn-all">Faol hammasi</button>
</div>
            </div>
        </div>

        <div class="orders-page-bg"></div>

<div class="orders-grid" id="ordersContainer">
    <div style="text-align: center; padding: 40px; color: var(--text-muted); grid-column: 1/-1;">Yuklanmoqda...</div>
</div>
    </main>

    <script>
        function showMessage(text, type='success') {
            const container = document.getElementById('js-messages');
            if(!container) return;
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.style.borderLeftColor = type === 'error' ? 'var(--danger)' : (type === 'warning' ? 'var(--warning)' : 'var(--success)');
            msg.innerText = text;
            container.appendChild(msg);
            setTimeout(() => {
                msg.style.transition = 'opacity 0.5s';
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 500);
            }, 3000);
        }

        setTimeout(() => {
            document.querySelectorAll('.message').forEach(el => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 500);
            });
        }, 3000);
    </script>
    <script>
    let currentStatusFilter = new URLSearchParams(window.location.search).get('status') || '';

    async function loadOrders() {
        try {
            document.querySelectorAll('.top-bar-actions .btn').forEach(btn => btn.classList.remove('active'));
            if (currentStatusFilter === 'pending') document.getElementById('btn-pending').classList.add('active');
            else if (currentStatusFilter === 'preparing') document.getElementById('btn-preparing').classList.add('active');
            else if (currentStatusFilter === 'ready') document.getElementById('btn-ready').classList.add('active');
            else document.getElementById('btn-all').classList.add('active');

            const res = await fetch(API_BASE_URL + `/api/staff/orders/?status=${currentStatusFilter}`, { credentials: 'include' });
            if (!res.ok) return;
            const data = await res.json();
            
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';
            
            if (data.orders.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-muted); grid-column: 1/-1;">Buyurtmalar topilmadi</div>`;
                return;
            }
            
            data.orders.forEach(order => {
                let itemsHTML = '';
                order.items.forEach(item => {
                    itemsHTML += `
                        <li class="slip-item">
                            <span>${item.menu_item_detail ? item.menu_item_detail.name : 'Taom'}</span>
                            <span class="qty">${item.quantity} x ${item.servings} kishilik</span>
                        </li>
                    `;
                });
                
                let notesHTML = '';
                if (order.notes) {
                    notesHTML = `
                        <div class="slip-notes">
                            <i class="fas fa-comment-alt" style="margin-right: 5px;"></i> ${order.notes}
                        </div>
                    `;
                }
                
                let selectHTML = `<select id="statusSelect-${order.id}">`;
                for (const [code, label] of Object.entries(data.status_choices)) {
                    const selected = order.status === code ? 'selected' : '';
                    selectHTML += `<option value="${code}" ${selected}>${label}</option>`;
                }
                selectHTML += `</select>`;
                
                let slipClass = 'preparing';
                if (order.status === 'pending') slipClass = 'pending';
                else if (order.status === 'ready') slipClass = 'ready';
                
                const time = new Date(order.created_at).toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
                
                container.innerHTML += `
                    <div class="order-slip ${slipClass}">
                        <div>
                            <div class="slip-header">
                                <h3>Buyurtma #${order.id}</h3>
                                <span class="badge badge-info">Stol ${order.table_detail.number}</span>
                            </div>
                            <ul class="slip-items">
                                ${itemsHTML}
                            </ul>
                            ${notesHTML}
                        </div>
                        <div>
                            <div class="slip-footer">
                                <span>Vaqt: ${time}</span>
                                <span class="total">${Number(order.total_price).toLocaleString()} so'm</span>
                            </div>
                            <div class="slip-actions">
                                ${selectHTML}
                                <button onclick="updateStatus(${order.id})" class="btn btn-primary" style="padding: 10px 14px;"><i class="fas fa-check"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch (err) {
            console.error('Orders load error:', err);
        }
    }

    function filterStatus(status) {
        currentStatusFilter = status;
        const url = new URL(window.location);
        if (status) url.searchParams.set('status', status);
        else url.searchParams.delete('status');
        window.history.pushState({}, '', url);
        loadOrders();
    }

    async function updateStatus(orderId) {
        const select = document.getElementById(`statusSelect-${orderId}`);
        const status = select.value;
        try {
            const res = await fetch(`/api/staff/orders/${orderId}/update-status/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ status })
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                loadOrders();
            } else {
                showMessage(data.error || 'Yangilashda xatolik', 'error');
            }
        } catch (err) {
            console.error('Update status error:', err);
            showMessage('Tizim bilan bog\'lanishda xatolik', 'error');
        }
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadOrders();
    });
</script>
</body>
</html>
