<!DOCTYPE html>
<html lang="uz">
<head>
    <script src="../js/config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stollar Boshqaruvi - Smart Cafe Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #090d16;
            --bg-sidebar: rgba(17, 24, 39, 0.6);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header i {
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-nav {
            padding: 20px 12px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(99, 102, 241, 0.05));
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-left: 260px;
            padding: 30px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .page-title h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
        }

        /* Tables & Lists (Glass cards) */
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 24px;
            background-color: rgba(255, 255, 255, 0.02);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Badges */
        .badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-info { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.2); }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #4f46e5); 
            color: white; 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }
        .btn-outline { 
            border-color: var(--border); 
            color: var(--text-main); 
            background: rgba(255, 255, 255, 0.05); 
        }
        .btn-outline:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.2);
        }

        .messages {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .message {
            padding: 14px 24px;
            border-radius: 12px;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            font-size: 0.875rem;
            color: #fff;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
    <style>
    :root {
        --deep-green: #064e3b;
        --glass: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
        background: linear-gradient(rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.95)), 
                    url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
        background-size: cover;
        color: #fff;
    }

    .main-content {
        background: transparent !important;
    }

    .page-title h1, .page-title p {
        color: #fff !important;
    }

    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        margin-bottom: 30px;
    }

    .add-table-form {
        display: flex;
        gap: 20px;
        align-items: flex-end;
        flex-wrap: wrap;
    }

    .form-group {
        flex: 1;
        min-width: 200px;
    }

    .form-group label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        font-size: 0.9rem;
    }

    .form-control {
        width: 100%;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: #fff;
        outline: none;
    }

    .btn-add {
        background: #10b981;
        color: white;
        padding: 12px 30px;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-add:hover {
        background: #059669;
        transform: scale(1.05);
    }

    .table-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 25px;
    }

    .table-card {
        background: var(--glass);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 25px;
        text-align: center;
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
    }

    .table-card:hover {
        transform: translateY(-10px);
        border-color: #10b981;
        box-shadow: 0 15px 45px rgba(0,0,0,0.4);
    }

    .status-icon {
        width: 60px;
        height: 60px;
        line-height: 60px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        margin: 0 auto 15px;
        font-size: 1.5rem;
    }

    .status-free { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    .status-occupied { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
    .status-reserved { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
    .status-cleaning { color: #55efc4; text-shadow: 0 0 10px rgba(85, 239, 196, 0.5); }

    .status-select {
        width: 100%;
        background: rgba(0,0,0,0.3);
        color: #fff;
        border: 1px solid var(--glass-border);
        padding: 10px;
        border-radius: 10px;
        margin: 15px 0;
        cursor: pointer;
    }

    .qr-link {
        display: block;
        padding: 10px;
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
        color: #fff;
        text-decoration: none;
        font-size: 0.8rem;
        transition: 0.3s;
    }

    .qr-link:hover {
        background: #fff;
        color: var(--deep-green);
    }
</style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-mug-hot"></i>
            <h2>Cafe Admin</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="staff/dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Buyurtmalar</span>
            </a>
            <a href="calls.html" class="nav-item">
                <i class="fas fa-bell"></i>
                <span>Chaqiruvlar</span>
            </a>
            <a href="../menu.html" class="nav-item">
                <i class="fas fa-utensils"></i>
                <span>Menyu</span>
            </a>
            <a href="tables.html" class="nav-item">
                <i class="fas fa-chair"></i>
                <span>Stollar</span>
            </a>
            <a href="{% url 'core:staff_settings' %}" class="nav-item">
                <i class="fas fa-user-cog"></i>
                <span>Sozlamalar</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="{% url 'core:staff_logout' %}" class="nav-item">
                <i class="fas fa-sign-out-alt"></i>
                <span>Chiqish</span>
            </a>
        </div>
    </div>

    <main class="main-content">
        <div class="messages" id="js-messages"></div>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="top-bar">
            <div class="page-title">
                <h1>Stollar Boshqaruvi</h1>
                <p>Boshqaruv Panel</p>
            </div>
            <div class="top-bar-actions">
                
            </div>
        </div>

        <div class="glass-card">
    <h3 style="margin-bottom: 20px;"><i class="fas fa-tools"></i> Yangi Stol O'rnatish</h3>
    <form id="addTableForm" class="add-table-form">
        <div class="form-group">
            <label>Stol Raqami</label>
            <input type="number" id="tableNumInput" placeholder="Masalan: 12" required class="form-control">
        </div>
        <button type="submit" class="btn-add">
            <i class="fas fa-plus"></i> Stol Qo'shish
        </button>
    </form>
</div>

<div class="table-grid" id="tablesGrid">
    <div style="text-align: center; padding: 40px; color: var(--text-muted); grid-column: 1/-1;">Yuklanmoqda...</div>
</div>
    </main>

    <script>
        function showMessage(text, type='success') {
            const container = document.getElementById('js-messages');
            if(!container) return;
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.style.borderLeftColor = type === 'error' ? 'var(--danger)' : (type === 'warning' ? 'var(--warning)' : 'var(--success)');
            msg.innerText = text;
            container.appendChild(msg);
            setTimeout(() => {
                msg.style.transition = 'opacity 0.5s';
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 500);
            }, 3000);
        }

        setTimeout(() => {
            document.querySelectorAll('.message').forEach(el => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 500);
            });
        }, 3000);
    </script>
    <script>
    async function loadTables() {
        try {
            const res = await fetch(API_BASE_URL + '/api/staff/tables/', { credentials: 'include' });
            if (!res.ok) return;
            const tables = await res.json();
            
            const grid = document.getElementById('tablesGrid');
            grid.innerHTML = '';
            
            if (tables.length === 0) {
                grid.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-muted); grid-column: 1/-1;">Stollar topilmadi</div>`;
                return;
            }
            
            tables.forEach(table => {
                let statusIconClass = 'status-reserved';
                if (table.status === 'free') statusIconClass = 'status-free';
                else if (table.status === 'occupied') statusIconClass = 'status-occupied';
                else if (table.status === 'cleaning') statusIconClass = 'status-cleaning';
                
                grid.innerHTML += `
                    <div class="table-card">
                        <div class="status-icon">
                            <i class="fas fa-chair ${statusIconClass}"></i>
                        </div>
                        <h3 style="font-size: 1.5rem; margin-bottom: 5px;">Stol #${table.number}</h3>
                        <span style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6);">
                            ${table.status_display}
                        </span>
                        
                        <select onchange="updateTableStatus(${table.id}, this.value)" class="status-select">
                            <option value="free" ${table.status === 'free' ? 'selected' : ''}>Bo'sh (Free)</option>
                            <option value="occupied" ${table.status === 'occupied' ? 'selected' : ''}>Band (Occupied)</option>
                            <option value="reserved" ${table.status === 'reserved' ? 'selected' : ''}>Bron (Reserved)</option>
                            <option value="cleaning" ${table.status === 'cleaning' ? 'selected' : ''}>Tozalash (Cleaning)</option>
                        </select>
                        
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <a href="/menu/${table.id}/" target="_blank" class="qr-link" style="flex: 2; display: flex; align-items: center; justify-content: center; gap: 5px;">
                                <i class="fas fa-qrcode"></i> QR Menyu
                            </a>
                            <button onclick="deleteTable(${table.id}, ${table.number})" class="btn btn-danger" style="flex: 1; padding: 10px; font-size: 0.85rem; background: linear-gradient(135deg, #e74c3c, #c0392b); border: none; color: #fff; cursor: pointer; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2);" title="Stolni o'chirish">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        } catch (err) {
            console.error('Tables load error:', err);
        }
    }

    async function updateTableStatus(tableId, status) {
        try {
            const res = await fetch(`/api/staff/tables/${tableId}/status/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ status })
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                loadTables();
            } else {
                showMessage(data.error || 'Yangilashda xatolik', 'error');
            }
        } catch (err) {
            console.error('Update status error:', err);
            showMessage('Tizim bilan bog\'lanishda xatolik', 'error');
        }
    }

    async function deleteTable(tableId, tableNumber) {
        if (!confirm(`Haqiqatan ham #${tableNumber}-stolni butunlay o'chirmoqchimisiz?\n(Ushbu stoldagi barcha faol buyurtmalar va sessiyalar o'chib ketadi!)`)) {
            return;
        }
        try {
            const res = await fetch(`/api/staff/tables/${tableId}/delete/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                loadTables();
            } else {
                showMessage(data.error || "O'chirishda xatolik yuz berdi", 'error');
            }
        } catch (err) {
            console.error('Delete table error:', err);
            showMessage("Tizim bilan bog'lanishda xatolik", 'error');
        }
    }

    document.getElementById('addTableForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const number = parseInt(document.getElementById('tableNumInput').value);
        try {
            const res = await fetch('/api/staff/tables/add/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ number })
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                document.getElementById('tableNumInput').value = '';
                loadTables();
            } else {
                showMessage(data.error || 'Qo\'shishda xatolik', 'error');
            }
        } catch (err) {
            console.error('Add table error:', err);
            showMessage('Tizim bilan bog\'lanishda xatolik', 'error');
        }
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadTables();
    });
</script>
</body>
</html>
