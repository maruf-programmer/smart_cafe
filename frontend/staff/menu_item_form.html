<!DOCTYPE html>
<html lang="uz">
<head>
    <script src="../js/config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangi taom - Cafe Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #090d16;
            --bg-sidebar: rgba(17, 24, 39, 0.6);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header i {
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-nav {
            padding: 20px 12px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(99, 102, 241, 0.05));
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-left: 260px;
            padding: 30px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .page-title h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
        }

        /* Tables & Lists (Glass cards) */
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 24px;
            background-color: rgba(255, 255, 255, 0.02);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Badges */
        .badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-info { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.2); }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #4f46e5); 
            color: white; 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }
        .btn-outline { 
            border-color: var(--border); 
            color: var(--text-main); 
            background: rgba(255, 255, 255, 0.05); 
        }
        .btn-outline:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.2);
        }

        .messages {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .message {
            padding: 14px 24px;
            border-radius: 12px;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            font-size: 0.875rem;
            color: #fff;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar h2, .sidebar .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
    
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-mug-hot"></i>
            <h2>Cafe Admin</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="staff/dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Buyurtmalar</span>
            </a>
            <a href="calls.html" class="nav-item">
                <i class="fas fa-bell"></i>
                <span>Chaqiruvlar</span>
            </a>
            <a href="../menu.html" class="nav-item">
                <i class="fas fa-utensils"></i>
                <span>Menyu</span>
            </a>
            <a href="tables.html" class="nav-item">
                <i class="fas fa-chair"></i>
                <span>Stollar</span>
            </a>
            <a href="{% url 'core:staff_settings' %}" class="nav-item">
                <i class="fas fa-user-cog"></i>
                <span>Sozlamalar</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="{% url 'core:staff_logout' %}" class="nav-item">
                <i class="fas fa-sign-out-alt"></i>
                <span>Chiqish</span>
            </a>
        </div>
    </div>

    <main class="main-content">
        <div class="messages" id="js-messages"></div>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="top-bar">
            <div class="page-title">
                <h1><span id="pageTitle2">Yangi taom qo'shish</span></h1>
                <p>Boshqaruv Panel</p>
            </div>
            <div class="top-bar-actions">
                
            </div>
        </div>

        <div class="card" style="max-width: 700px; margin: 0 auto; padding: 30px;">
    <form id="menuItemForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Taom nomi</label>
                <input type="text" id="name" required class="btn btn-outline" style="width: 100%; text-align: left;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Kategoriya</label>
                <select id="category" required class="btn btn-outline" style="width: 100%; text-align: left;">
                    <!-- Categories loaded dynamically -->
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Narxi (so'm)</label>
                <input type="number" id="price" required class="btn btn-outline" style="width: 100%; text-align: left;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Tayyorlanish vaqti (daqiqa)</label>
                <input type="number" id="prep_time_minutes" class="btn btn-outline" style="width: 100%; text-align: left;" value="20">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Og'irligi (gramm)</label>
                <input type="number" id="weight_grams" class="btn btn-outline" style="width: 100%; text-align: left;" value="250">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Kaloriya (kcal)</label>
                <input type="number" id="calories" class="btn btn-outline" style="width: 100%; text-align: left;" value="0">
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 12px; font-weight: 500;">Taom rasmlari (Maksimal 10 ta rasm)</label>
            <div id="imagesGallery" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-bottom: 15px;">
                <!-- Rendered dynamically -->
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <label style="margin: 0; cursor: pointer; justify-content: center; flex: 1;" class="btn btn-primary" for="image_file">
                    <i class="fas fa-plus"></i> Rasm qo'shish (Upload)
                </label>
                <input type="file" id="image_file" style="display: none;" accept="image/*">
                <input type="hidden" id="image" value="">
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Porsiya turlari (vergul bilan ajratilgan, masalan: 1, 1.5, 2)</label>
            <input type="text" id="serving_options" class="btn btn-outline" style="width: 100%; text-align: left;" placeholder="Masalan: 1, 1.5, 2" value="1">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Vitaminlar (masalan: A B1 B2 C E)</label>
            <input type="text" id="vitamins" class="btn btn-outline" style="width: 100%; text-align: left;" placeholder="Masalan: A B C">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Tavsif</label>
            <textarea id="description" rows="3" class="btn btn-outline" style="width: 100%; text-align: left;"></textarea>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Tarkibi</label>
            <textarea id="ingredients" rows="3" class="btn btn-outline" style="width: 100%; text-align: left;" placeholder="Masalan: Go'sht, kartoshka, piyoz..."></textarea>
        </div>

        <div style="margin-bottom: 30px; display: flex; gap: 20px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="is_available" checked>
                <label for="is_available" style="font-weight: 500; margin: 0;">Sotuvda mavjud</label>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="is_popular">
                <label for="is_popular" style="font-weight: 500; margin: 0;">Mashhur (Popular)</label>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Saqlash</button>
            <button type="button" id="btnDelete" class="btn btn-danger" style="display: none; flex: 1; background: linear-gradient(135deg, #e74c3c, #c0392b); border: none; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-trash-alt"></i> O'chirish
            </button>
            <a href="../menu.html" class="btn btn-outline" style="flex: 1; justify-content: center;">Bekor qilish</a>
        </div>
    </form>
</div>
    </main>

    <script>
        function showMessage(text, type='success') {
            const container = document.getElementById('js-messages');
            if(!container) return;
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.style.borderLeftColor = type === 'error' ? 'var(--danger)' : (type === 'warning' ? 'var(--warning)' : 'var(--success)');
            msg.innerText = text;
            container.appendChild(msg);
            setTimeout(() => {
                msg.style.transition = 'opacity 0.5s';
                msg.style.opacity = '0';
                setTimeout(() => msg.remove(), 500);
            }, 3000);
        }

        setTimeout(() => {
            document.querySelectorAll('.message').forEach(el => {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 500);
            });
        }, 3000);
    </script>
    <script>
    let itemId = "{{ item_id }}"; // will be empty string if not editing
    if (itemId === "" || itemId === "None" || itemId.startsWith("{")) {
        const urlParams = new URLSearchParams(window.location.search);
        itemId = urlParams.get('item_id') || "";
    }

    let uploadedImages = [];

    function renderGallery() {
        const gallery = document.getElementById('imagesGallery');
        gallery.innerHTML = '';
        
        if (uploadedImages.length === 0) {
            gallery.innerHTML = `<div style="grid-column: 1/-1; padding: 25px; text-align: center; color: var(--text-muted); border: 2px dashed var(--border); border-radius: 12px; font-size: 0.85rem; background: rgba(255,255,255,0.01);">Hozircha rasmlar yuklanmagan (maks 10 ta)</div>`;
            document.getElementById('image').value = '';
            return;
        }
        
        // Sync first image as cover image
        document.getElementById('image').value = uploadedImages[0] || '';
        
        uploadedImages.forEach((imgUrl, index) => {
            gallery.innerHTML += `
                <div style="position: relative; width: 100px; height: 100px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #0c101b;">
                    <img src="${imgUrl}" style="width: 100%; height: 100%; object-fit: cover;">
                    <button type="button" onclick="removeGalleryImage(${index})" style="position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(239, 68, 68, 0.85); color: #fff; border: none; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;">
                        <i class="fas fa-times"></i>
                    </button>
                    ${index === 0 ? '<span style="position: absolute; bottom: 0; left: 0; right: 0; font-size: 0.65rem; background: rgba(99, 102, 241, 0.85); color: #fff; text-align: center; padding: 2px 0; font-weight: 600;">Asosiy</span>' : ''}
                </div>
            `;
        });
    }

    window.removeGalleryImage = function(index) {
        uploadedImages.splice(index, 1);
        renderGallery();
    };

    async function loadForm() {
        try {
            // Load Categories list
            const catRes = await fetch(API_BASE_URL + '/api/categories/', { credentials: 'include' });
            const categories = await catRes.json();
            const select = document.getElementById('category');
            select.innerHTML = '';
            categories.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
            
            if (itemId && itemId !== "None" && itemId !== "") {
                // Edit mode
                document.title = "Tahrirlash - Cafe Admin";
                document.getElementById('pageTitle2').innerText = "Taomni tahrirlash";
                document.getElementById('btnDelete').style.display = 'inline-flex';
                
                const res = await fetch(API_BASE_URL + `/api/menu-items/${itemId}/`, { credentials: 'include' });
                if (res.ok) {
                    const item = await res.json();
                    document.getElementById('name').value = item.name;
                    document.getElementById('category').value = item.category;
                    document.getElementById('price').value = Math.round(item.price);
                    document.getElementById('prep_time_minutes').value = item.prep_time_minutes;
                    document.getElementById('weight_grams').value = item.weight_grams;
                    document.getElementById('calories').value = item.calories;
                    document.getElementById('image').value = item.image || '';
                    document.getElementById('serving_options').value = item.serving_options ? item.serving_options.join(', ') : '1';
                    document.getElementById('vitamins').value = item.vitamins || '';
                    document.getElementById('description').value = item.description || '';
                    document.getElementById('ingredients').value = item.ingredients || '';
                    document.getElementById('is_available').checked = item.is_available;
                    document.getElementById('is_popular').checked = item.is_popular;
                    
                    uploadedImages = item.images || [];
                    if (uploadedImages.length === 0 && item.image) {
                        uploadedImages.push(item.image);
                    }
                    renderGallery();
                }
            } else {
                renderGallery();
            }
        } catch (err) {
            console.error('Load form error:', err);
        }
    }

    document.getElementById('image_file').addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;
        
        if (uploadedImages.length >= 10) {
            showMessage("Ko'pi bilan 10 ta rasm yuklash mumkin!", "error");
            this.value = '';
            return;
        }
        
        const formData = new FormData();
        formData.append('image', file);
        
        try {
            showMessage("Rasm yuklanmoqda...", "warning");
            const res = await fetch('/api/staff/upload-image/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: formData
            });
            const data = await res.json();
            if (res.ok) {
                uploadedImages.push(data.url);
                renderGallery();
                showMessage("Rasm muvaffaqiyatli yuklandi!", "success");
            } else {
                showMessage(data.error || "Rasm yuklashda xatolik", "error");
            }
        } catch (err) {
            console.error("Upload error:", err);
            showMessage("Tizim bilan bog'lanishda xatolik", "error");
        }
        this.value = '';
    });

    document.getElementById('menuItemForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const body = {
            name: document.getElementById('name').value,
            category: parseInt(document.getElementById('category').value),
            price: parseFloat(document.getElementById('price').value),
            prep_time_minutes: parseInt(document.getElementById('prep_time_minutes').value || 20),
            weight_grams: parseInt(document.getElementById('weight_grams').value || 250),
            calories: parseInt(document.getElementById('calories').value || 0),
            image: document.getElementById('image').value,
            images: uploadedImages,
            serving_options: document.getElementById('serving_options').value,
            vitamins: document.getElementById('vitamins').value,
            description: document.getElementById('description').value,
            ingredients: document.getElementById('ingredients').value,
            is_available: document.getElementById('is_available').checked,
            is_popular: document.getElementById('is_popular').checked
        };
        
        const isEdit = itemId && itemId !== "None" && itemId !== "";
        const url = isEdit ? `/api/staff/menu/item/${itemId}/edit/` : '/api/staff/menu/item/add/';
        
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                setTimeout(() => window.location.href = '/staff/menu/', 1500);
            } else {
                showMessage(data.error || 'Saqlashda xatolik', 'error');
            }
        } catch (err) {
            console.error('Form submit error:', err);
            showMessage('Tizim bilan bog\'lanishda xatolik', 'error');
        }
    });

    document.getElementById('btnDelete').addEventListener('click', async function() {
        if (!confirm("Haqiqatan ham ushbu taomni butunlay o'chirmoqchimisiz?\n(Ushbu amalni ortga qaytarib bo'lmaydi!)")) {
            return;
        }
        try {
            const res = await fetch(`/api/staff/menu/item/${itemId}/delete/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            const data = await res.json();
            if (res.ok) {
                showMessage(data.message, 'success');
                setTimeout(() => window.location.href = '/staff/menu/', 1500);
            } else {
                showMessage(data.error || 'O\'chirishda xatolik yuz berdi', 'error');
            }
        } catch (err) {
            console.error('Delete error:', err);
            showMessage('Tizim bilan bog\'lanishda xatolik', 'error');
        }
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadForm();
    });
</script>
</body>
</html>
