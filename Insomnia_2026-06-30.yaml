spec:
  contents:
    openapi: 3.0.3
    info:
      title: Smart Cafe API Specification
      description: API endpoints for customer and staff management systems in Smart
        Cafe project.
      version: 1.0.0
    servers:
      - url: http://127.0.0.1:8000/api
        description: Local development server
    tags:
      - name: Mijoz - Umumiy
        description: Reklama, statistika va faol ofitsiantlar ro'yxati kabi umumiy yordamchi API yo'llari
      - name: Mijoz - Stollar
        description: Stol tanlash, holatni kuzatish va sessiyani o'rnatish uchun API yo'llari
      - name: Mijoz - Menyu
        description: Kategoriyalarni ko'rish va batafsil taom kartalari uchun API yo'llari
      - name: Mijoz - Savatcha va Buyurtma
        description: Endpoints for managing table-specific carts, orders, and checkout
          payments
      - name: Mijoz - Xizmatlar va Fikr-mulohazalar
        description: Ofitsiantni chaqirish va stollar uchun fikr-mulohazalar yozib qoldirish API yo'llari
